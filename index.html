<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leave a Review</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="bg-blur bg-1"></div>
<div class="bg-blur bg-2"></div>

<div class="container">

<div class="logo">
🦷
</div>

<h1>Share Your Experience</h1>

<p class="subtitle">
Your feedback helps other patients find trusted dental care in Dehradun.
</p>

<div class="stars" id="stars">

<span class="star" data-rating="1">★</span>
<span class="star" data-rating="2">★</span>
<span class="star" data-rating="3">★</span>
<span class="star" data-rating="4">★</span>
<span class="star" data-rating="5">★</span>

</div>

<div class="review-section" id="reviewSection">

<div class="review-title">
Select a review
</div>

<div id="reviewList"></div>

<button
class="btn"
id="submitBtn"
disabled
onclick="submitReview()">

Copy Review & Continue

</button>

</div>

</div>

<div class="loader" id="loader">

<div class="spinner"></div>

<h3>Preparing your review...</h3>

<p>
Copying review and opening Google Reviews
</p>

</div>

<div class="toast" id="toast"></div>

<script src="index.js"></script>

</body>
</html>
